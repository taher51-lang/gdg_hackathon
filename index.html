<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emergency SOS Portal</title>
    <style>
        :root {
            --bg-dark: #0f172a;
            --panel-bg: #1e293b;
            --text-light: #f8fafc;
            --text-muted: #94a3b8;
            --accent-red: #ef4444;
            --accent-red-hover: #dc2626;
            --accent-blue: #3b82f6;
            --accent-blue-hover: #2563eb;
            --border-color: #334155;
            --font-main: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: var(--font-main);
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-light);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* Container for everything */
        .app-container {
            width: 100%;
            max-width: 500px;
            padding: 20px;
            text-align: center;
            position: relative;
        }

        /* Step Management */
        .step {
            display: none;
            flex-direction: column;
            align-items: center;
            animation: fadeIn 0.3s ease-out;
        }

        .step.active {
            display: flex;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Typography */
        h2 {
            font-size: 1.8rem;
            margin-bottom: 24px;
            font-weight: 700;
        }

        /* ======================== 
           STEP 1: SOS BUTTON 
           ======================== */
        .sos-button-wrapper {
            position: relative;
            margin-top: 40px;
        }

        .sos-button {
            width: 260px;
            height: 260px;
            border-radius: 50%;
            background: linear-gradient(145deg, #ef4444, #b91c1c);
            color: white;
            font-size: 5rem;
            font-weight: 900;
            border: 10px solid #fee2e2;
            cursor: pointer;
            box-shadow: 0 0 60px rgba(239, 68, 68, 0.5), inset 0px -8px 20px rgba(0, 0, 0, 0.3);
            text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.1s, box-shadow 0.2s;
            z-index: 10;
            position: relative;
        }

        .sos-button:active {
            transform: scale(0.95);
            box-shadow: 0 0 30px rgba(239, 68, 68, 0.7), inset 0px -15px 30px rgba(0, 0, 0, 0.5);
        }

        /* Flashing rings behind the button */
        .sos-ripple {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 260px;
            height: 260px;
            border-radius: 50%;
            background: rgba(239, 68, 68, 0.4);
            z-index: 1;
            animation: ripple 2s infinite ease-out;
            pointer-events: none;
        }

        .sos-ripple:nth-child(2) {
            animation-delay: 1s;
        }

        @keyframes ripple {
            0% {
                width: 260px;
                height: 260px;
                opacity: 1;
            }

            100% {
                width: 500px;
                height: 500px;
                opacity: 0;
            }
        }

        /* ======================== 
           STEP 2, 3, 4: Forms
           ======================== */
        .option-btn {
            background-color: var(--panel-bg);
            color: var(--text-light);
            border: 2px solid var(--border-color);
            width: 100%;
            padding: 20px;
            margin-bottom: 15px;
            border-radius: 12px;
            font-size: 1.2rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .option-btn:hover {
            border-color: var(--accent-red);
            background-color: rgba(239, 68, 68, 0.1);
        }

        textarea,
        input[type="text"] {
            width: 100%;
            background-color: var(--bg-dark);
            border: 2px solid var(--border-color);
            color: var(--text-light);
            padding: 16px;
            border-radius: 12px;
            font-size: 1.1rem;
            margin-bottom: 20px;
            resize: vertical;
        }

        textarea:focus,
        input[type="text"]:focus {
            outline: none;
            border-color: var(--accent-blue);
        }

        .action-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            width: 100%;
        }

        .btn {
            padding: 16px;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: bold;
            border: none;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-blue {
            background-color: var(--accent-blue);
            color: white;
            width: 100%;
        }

        .btn-blue:hover {
            background-color: var(--accent-blue-hover);
        }

        .btn-red {
            background-color: var(--accent-red);
            color: white;
            width: 100%;
        }

        .btn-red:hover {
            background-color: var(--accent-red-hover);
        }

        .btn-outline {
            background-color: transparent;
            border: 2px solid var(--text-muted);
            color: var(--text-muted);
            margin-top: 20px;
            width: auto;
            padding: 10px 24px;
        }

        .btn-outline:hover {
            color: var(--text-light);
            border-color: var(--text-light);
        }

        .mic-btn {
            background-color: var(--panel-bg);
            border: 2px solid var(--border-color);
            color: var(--text-light);
            padding: 12px;
            border-radius: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin: 0 auto 24px auto;
            cursor: pointer;
            width: fit-content;
            font-size: 1rem;
        }

        .mic-btn.listening {
            background-color: rgba(239, 68, 68, 0.2);
            border-color: var(--accent-red);
            color: var(--accent-red);
            animation: pulse-mic 1s infinite;
        }

        @keyframes pulse-mic {
            0% {
                box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4);
            }

            70% {
                box-shadow: 0 0 0 10px rgba(239, 68, 68, 0);
            }

            100% {
                box-shadow: 0 0 0 0 rgba(239, 68, 68, 0);
            }
        }

        .status-text {
            color: #34d399;
            /* Green */
            font-size: 0.95rem;
            margin-bottom: 20px;
            min-height: 20px;
        }

        /* ======================== 
           STEP 5: Sending animation
           ======================== */
        .radar-spinner {
            width: 80px;
            height: 80px;
            border: 4px solid var(--border-color);
            border-top-color: var(--accent-red);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 30px auto;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        pre {
            background: #020617;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            color: #34d399;
            text-align: left;
            font-size: 0.85rem;
            white-space: pre-wrap;
            word-break: break-word;
            margin-top: 20px;
            width: 100%;
        }
    </style>
</head>

<body>

    <div class="app-container">

        <!-- STEP 1: HOME -->
        <div id="step-home" class="step active">
            <h1 style="color: var(--accent-red); letter-spacing: 2px; margin-bottom: 10px;">EMERGENCY PORTAL</h1>
            <p style="color: var(--text-muted); font-size: 1.1rem;">Press the button below for immediate assistance</p>

            <div class="sos-button-wrapper">
                <div class="sos-ripple"></div>
                <div class="sos-ripple"></div>
                <button class="sos-button" onclick="goToStep('step-type')">SOS</button>
            </div>
        </div>


        <!-- STEP 2: CRISIS TYPE -->
        <div id="step-type" class="step">
            <h2>What's your emergency?</h2>

            <button class="option-btn" onclick="selectType('Fire Accident')">
                🔥 Fire Accident
            </button>
            <button class="option-btn" onclick="selectType('Medical / Any Emergency')">
                🚑 Medical / Other Emergency
            </button>

            <button class="btn btn-outline" onclick="goToStep('step-home')">Cancel</button>
        </div>


        <!-- STEP 3: DETAILS & MIC -->
        <div id="step-input" class="step">
            <h2>Provide Details</h2>
            <p id="display-type" style="color: var(--accent-red); font-weight: bold; margin-bottom: 15px;">Target:
                Unknown</p>

            <textarea id="emergency-text" rows="4"
                placeholder="Briefly describe the situation (e.g. 'Huge grease fire in kitchen, 2 people trapped...')"></textarea>

            <button class="mic-btn" id="mic-btn" onclick="toggleMic()">
                🎤 <span>Tap to Speak</span>
            </button>

            <button class="btn btn-blue" onclick="goToStep('step-location')">Continue ➔</button>
            <button class="btn btn-outline" onclick="goToStep('step-type')">Back</button>
        </div>


        <!-- STEP 4: LOCATION -->
        <div id="step-location" class="step">
            <h2>Where are you?</h2>

            <button class="btn btn-blue" style="margin-bottom: 15px;" onclick="detectGPS()">
                📍 Auto-Detect Live GPS
            </button>

            <div id="gps-status" class="status-text"></div>

            <p style="color: var(--text-muted); margin: 10px 0;">— OR ENTER MANUALLY —</p>

            <input type="text" id="manual-location" placeholder="e.g. Times Square, near the red stairs">

            <button class="btn btn-red" style="margin-top:20px; font-size: 1.3rem; letter-spacing: 1px;"
                onclick="sendToLLM()">
                🚨 ROUTE TO HOSPITAL
            </button>

            <button class="btn btn-outline" onclick="goToStep('step-input')">Back</button>
        </div>


        <!-- STEP 5: MOCK AI/BACKEND PROCESSING -->
        <div id="step-processing" class="step">
            <div class="radar-spinner"></div>
            <h2>Analyzing via LLM...</h2>
            <p style="color: var(--text-muted);">Predicting vectors and finding the nearest equipped hospital.</p>

            <!-- This shows what WOULD be sent to the actual app.py -->
            <pre id="mock-payload" style="display:none;"></pre>

            <button class="btn btn-outline" id="restart-btn" style="display:none; margin-top:20px;"
                onclick="location.reload()">Start Over</button>
        </div>

    </div>

    <script>
        // App State
        const EmergencyState = {
            type: '',
            details: '',
            lat: null,
            lng: null,
            manualAddress: ''
        };

        let isListening = false;
        let recognition;

        // Initialize Speech Recognition if supported
        if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
            const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechRec();
            recognition.continuous = false;
            recognition.interimResults = true;

            recognition.onresult = (event) => {
                const transcript = Array.from(event.results)
                    .map(result => result[0].transcript)
                    .join('');
                document.getElementById('emergency-text').value = transcript;
            };

            recognition.onerror = (event) => {
                console.error("Speech error", event);
                stopMic();
                alert("Mic error: " + event.error);
            };

            recognition.onend = () => {
                stopMic();
            };
        }

        // Navigation
        function goToStep(stepId) {
            document.querySelectorAll('.step').forEach(el => el.classList.remove('active'));
            document.getElementById(stepId).classList.add('active');
        }

        // Step 2 Logic
        function selectType(type) {
            EmergencyState.type = type;
            document.getElementById('display-type').innerText = `Category: ${type}`;
            goToStep('step-input');
        }

        // Step 3 Logic (Mic)
        function toggleMic() {
            if (!recognition) {
                alert("Speech Recognition not supported in this browser.");
                return;
            }

            if (isListening) {
                recognition.stop();
                stopMic();
            } else {
                document.getElementById('emergency-text').value = '';
                recognition.start();
                isListening = true;
                const btn = document.getElementById('mic-btn');
                btn.classList.add('listening');
                btn.querySelector('span').innerText = 'Listening... (Tap to stop)';
            }
        }

        function stopMic() {
            isListening = false;
            const btn = document.getElementById('mic-btn');
            btn.classList.remove('listening');
            btn.querySelector('span').innerText = 'Tap to Speak';
        }

        // Step 4 Logic (GPS)
        function detectGPS() {
            const status = document.getElementById('gps-status');
            status.style.color = "var(--text-muted)";
            status.innerText = "Locating...";

            if (!navigator.geolocation) {
                status.style.color = "var(--accent-red)";
                status.innerText = "Geolocation is not supported by your browser.";
                return;
            }

            navigator.geolocation.getCurrentPosition(
                (position) => {
                    EmergencyState.lat = position.coords.latitude;
                    EmergencyState.lng = position.coords.longitude;
                    status.style.color = "#34d399";
                    status.innerText = `✅ Coordinates locked: ${EmergencyState.lat.toFixed(4)}, ${EmergencyState.lng.toFixed(4)}`;
                    document.getElementById('manual-location').disabled = true;
                    document.getElementById('manual-location').value = "Auto-detected GPS";
                },
                (error) => {
                    status.style.color = "var(--accent-red)";
                    status.innerText = "Error: Please allow location or type manually.";
                }
            );
        }

        // Step 5 Logic (Simulate Submission)
        function sendToLLM() {
            EmergencyState.details = document.getElementById('emergency-text').value.trim();
            const manLoc = document.getElementById('manual-location').value.trim();

            if (manLoc !== "Auto-detected GPS") {
                EmergencyState.manualAddress = manLoc;
                // Clear lat/lng if user typed manual override
                EmergencyState.lat = null;
                EmergencyState.lng = null;
            }

            if (!EmergencyState.details) {
                alert("Please provide at least some details about the emergency.");
                goToStep('step-input');
                return;
            }

            if (!EmergencyState.lat && !EmergencyState.manualAddress) {
                alert("Please provide a location (auto-detect or type manually).");
                return;
            }

            // Show processing screen
            goToStep('step-processing');

            // Simulate API call delay
            setTimeout(() => {
                const h2 = document.querySelector('#step-processing h2');
                const p = document.querySelector('#step-processing p');
                const pre = document.getElementById('mock-payload');
                const radar = document.querySelector('.radar-spinner');

                radar.style.display = "none";
                h2.innerText = "Dispatched Successfully";
                h2.style.color = "#34d399";
                p.innerText = "The LLM processed the triage and routed this directly to the best-matched hospital vector.";

                // Show exactly what the backend would receive/produce 
                // (Connecting to the app.py schema)
                const payload = {
                    sent_to_backend: {
                        latitude: EmergencyState.lat || 0.0,
                        longitude: EmergencyState.lng || 0.0,
                        description: `[${EmergencyState.type}] ${EmergencyState.details}. Location Note: ${EmergencyState.manualAddress}`
                    },
                    mock_llm_triage_output: {
                        crisis_category: EmergencyState.type.includes("Fire") ? "FIRE" : "MEDICAL",
                        severity_level: "CRITICAL",
                        estimated_victims: 2,
                        resource_vector: ["advanced_life_support_ambulance", "trauma_surgeon"],
                        tts_summary: "A critical incident has occurred. Units dispatched."
                    }
                };

                pre.innerText = JSON.stringify(payload, null, 2);
                pre.style.display = "block";

                document.getElementById('restart-btn').style.display = "inline-block";

            }, 3000);
        }
    </script>

</body>

</html>
