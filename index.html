<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#0f172a">
    <title>Emergency SOS Portal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root {
            --bg-dark: #0f172a;
            --panel-bg: #1e293b;
            --text-light: #f8fafc;
            --text-muted: #94a3b8;
            --accent-red: #ef4444;
            --accent-red-hover: #dc2626;
            --accent-blue: #3b82f6;
            --accent-blue-hover: #2563eb;
            --border-color: #334155;
            --font-main: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: var(--font-main);
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-dark);
            background-image:
                radial-gradient(ellipse at 20% 20%, rgba(239,68,68,0.06) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(59,130,246,0.06) 0%, transparent 50%);
            color: var(--text-light);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            min-height: 100dvh;
            overflow-x: hidden;
            overflow-y: auto;
            padding: env(safe-area-inset-top, 0px) env(safe-area-inset-right, 0px) env(safe-area-inset-bottom, 0px) env(safe-area-inset-left, 0px);
        }

        /* Container for everything */
        .app-container {
            width: 100%;
            max-width: 520px;
            padding: clamp(16px, 4vw, 28px);
            text-align: center;
            position: relative;
            margin: auto;
            padding-top: max(24px, env(safe-area-inset-top));
            padding-bottom: max(24px, env(safe-area-inset-bottom));
        }

        /* Step Management */
        .step {
            display: none;
            flex-direction: column;
            align-items: center;
            animation: fadeIn 0.3s ease-out;
        }
        .step.active {
            display: flex;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Typography */
        h2 {
            font-size: clamp(1.35rem, 5vw, 1.8rem);
            margin-bottom: 20px;
            font-weight: 800;
            letter-spacing: -0.02em;
        }

        /* ======================== 
           STEP 1: SOS BUTTON 
           ======================== */
        .sos-button-wrapper {
            position: relative;
            margin-top: 40px;
        }
        .sos-button {
            width: min(240px, 62vw);
            height: min(240px, 62vw);
            border-radius: 50%;
            background: radial-gradient(circle at 40% 35%, #f87171, #b91c1c);
            color: white;
            font-size: clamp(2.8rem, 12vw, 4.5rem);
            font-weight: 900;
            border: clamp(6px, 1.5vw, 10px) solid rgba(254,226,226,0.8);
            cursor: pointer;
            box-shadow: 0 0 60px rgba(239, 68, 68, 0.5), inset 0px -8px 20px rgba(0,0,0,0.3);
            text-shadow: 2px 2px 8px rgba(0,0,0,0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.1s, box-shadow 0.2s;
            z-index: 10;
            position: relative;
        }
        .sos-button:active {
            transform: scale(0.95);
            box-shadow: 0 0 30px rgba(239, 68, 68, 0.7), inset 0px -15px 30px rgba(0,0,0,0.5);
        }
        
        /* Flashing rings behind the button */
        .sos-ripple {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: min(240px, 62vw);
            height: min(240px, 62vw);
            border-radius: 50%;
            background: rgba(239, 68, 68, 0.4);
            z-index: 1;
            animation: ripple 2s infinite ease-out;
            pointer-events: none;
        }
        .sos-ripple:nth-child(2) { animation-delay: 1s; }
        
        @keyframes ripple {
            0%   { transform: translate(-50%, -50%) scale(1);   opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(2.1); opacity: 0; }
        }

        /* ======================== 
           STEP 2, 3, 4: Forms
           ======================== */
        .option-btn {
            background-color: var(--panel-bg);
            color: var(--text-light);
            border: 2px solid var(--border-color);
            width: 100%;
            padding: clamp(14px, 4vw, 20px);
            margin-bottom: 12px;
            border-radius: 12px;
            font-size: clamp(1rem, 3vw, 1.2rem);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            min-height: 56px;
        }
        .option-btn:hover {
            border-color: var(--accent-red);
            background-color: rgba(239, 68, 68, 0.1);
        }
        .option-btn:active { transform: scale(0.98); }

        textarea, input[type="text"] {
            width: 100%;
            background-color: var(--bg-dark);
            border: 2px solid var(--border-color);
            color: var(--text-light);
            padding: clamp(12px, 3vw, 16px);
            border-radius: 12px;
            font-size: clamp(0.95rem, 2.5vw, 1.1rem);
            font-family: var(--font-main);
            margin-bottom: 16px;
            resize: vertical;
        }
        textarea:focus, input[type="text"]:focus {
            outline: none;
            border-color: var(--accent-blue);
        }
        textarea::placeholder, input[type="text"]::placeholder { color: #475569; }

        .action-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            width: 100%;
        }

        .btn {
            padding: clamp(12px, 3.5vw, 16px);
            border-radius: 12px;
            font-size: clamp(0.95rem, 2.5vw, 1.1rem);
            font-weight: 700;
            font-family: var(--font-main);
            border: none;
            cursor: pointer;
            transition: 0.2s;
            min-height: 48px;
        }
        .btn-blue {
            background-color: var(--accent-blue);
            color: white;
            width: 100%;
            box-shadow: 0 4px 14px rgba(59,130,246,0.3);
        }
        .btn-blue:hover  { background-color: var(--accent-blue-hover); }
        .btn-blue:active { transform: scale(0.98); }
        
        .btn-red {
            background: linear-gradient(135deg, var(--accent-red), var(--accent-red-hover));
            color: white;
            width: 100%;
            box-shadow: 0 4px 18px rgba(239,68,68,0.35);
            font-size: clamp(1rem, 3vw, 1.2rem);
            letter-spacing: 0.5px;
        }
        .btn-red:hover  { box-shadow: 0 6px 24px rgba(239,68,68,0.5); transform: translateY(-1px); }
        .btn-red:active { transform: scale(0.98) translateY(0); }

        .btn-outline {
            background-color: transparent;
            border: 2px solid var(--text-muted);
            color: var(--text-muted);
            margin-top: 16px;
            width: auto;
            padding: clamp(8px, 2vw, 10px) clamp(18px, 4vw, 24px);
            min-height: 44px;
        }
        .btn-outline:hover  { color: var(--text-light); border-color: var(--text-light); }
        .btn-outline:active { transform: scale(0.98); }

        .mic-btn {
            background-color: var(--panel-bg);
            border: 2px solid var(--border-color);
            color: var(--text-light);
            padding: clamp(10px, 2.5vw, 13px) clamp(18px, 4vw, 24px);
            border-radius: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin: 0 auto 20px auto;
            cursor: pointer;
            width: 100%;
            font-size: clamp(0.9rem, 2.5vw, 1rem);
            font-family: var(--font-main);
            font-weight: 600;
            min-height: 48px;
            transition: all 0.2s;
        }
        .mic-btn:hover { border-color: var(--accent-blue); background: rgba(59,130,246,0.08); }
        .mic-btn.listening {
            background-color: rgba(239, 68, 68, 0.15);
            border-color: var(--accent-red);
            color: var(--accent-red);
            animation: pulse-mic 1.2s infinite;
        }

        @keyframes pulse-mic {
            0%, 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); }
            50%       { box-shadow: 0 0 0 8px rgba(239, 68, 68, 0); }
        }

        .status-text {
            color: #34d399; /* Green */
            font-size: 0.95rem;
            margin-bottom: 20px;
            min-height: 20px;
        }

        /* ======================== 
           STEP 5: Sending animation
           ======================== */
        .radar-spinner {
            width: clamp(60px, 15vw, 80px);
            height: clamp(60px, 15vw, 80px);
            border: 4px solid var(--border-color);
            border-top-color: var(--accent-red);
            border-radius: 50%;
            animation: spin 0.9s linear infinite;
            margin: 0 auto 24px auto;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        pre {
            background: #020617;
            padding: clamp(10px, 2.5vw, 15px);
            border-radius: 8px;
            border: 1px solid var(--border-color);
            color: #34d399;
            text-align: left;
            font-size: clamp(0.72rem, 2vw, 0.85rem);
            white-space: pre-wrap;
            word-break: break-word;
            margin-top: 16px;
            width: 100%;
            max-height: 220px;
            overflow-y: auto;
        }

        /* ===== RESPONSIVE BREAKPOINTS ===== */
        @media (max-width: 360px) {
            .sos-button-wrapper { margin-top: 24px; }
            .action-grid { grid-template-columns: 1fr; }
        }
        @media (min-width: 600px) {
            .app-container { padding: 32px; }
            .option-btn { padding: 22px 20px; }
        }
        @media (min-width: 900px) {
            body { align-items: center; }
            .app-container { box-shadow: 0 24px 80px rgba(0,0,0,0.5); border-radius: 24px; background: rgba(15,23,42,0.6); backdrop-filter: blur(20px); border: 1px solid rgba(148,163,184,0.1); }
        }

        /* Countdown timer text */
        .countdown-text {
            color: var(--text-muted);
            font-size: 0.82rem;
            margin-top: -8px;
            margin-bottom: 12px;
            min-height: 18px;
            font-style: italic;
        }

        /* ETA banner above map */
        .eta-banner {
            display: none;
            width: 100%;
            background: rgba(52, 211, 153, 0.12);
            border: 1px solid #34d399;
            border-radius: 10px;
            padding: 12px 18px;
            margin-top: 18px;
            color: #34d399;
            font-size: 1.05rem;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        /* Leaflet map container */
        #dispatch-map {
            display: none;
            width: 100%;
            height: 240px;
            border-radius: 12px;
            margin-top: 12px;
            border: 1px solid var(--border-color);
            overflow: hidden;
        }
        
    </style>
</head>
<body>

<div class="app-container">

    <!-- STEP 1: HOME -->
    <div id="step-home" class="step active">
        <h1 style="color: var(--accent-red); letter-spacing: 2px; margin-bottom: 10px;">EMERGENCY PORTAL</h1>
        <p style="color: var(--text-muted); font-size: 1.1rem;">Press the button below for immediate assistance</p>
        
        <div class="sos-button-wrapper">
            <div class="sos-ripple"></div>
            <div class="sos-ripple"></div>
            <button class="sos-button" onclick="goToStep('step-type')">SOS</button>
        </div>
    </div>


    <!-- STEP 2: CRISIS TYPE -->
    <div id="step-type" class="step">
        <h2>What's your emergency?</h2>
        
        <button class="option-btn" onclick="selectType('Fire Accident')">
            🔥 Fire Accident
        </button>
        <button class="option-btn" onclick="selectType('Medical / Any Emergency')">
            🚑 Medical / Other Emergency
        </button>

        <button class="btn btn-outline" onclick="goToStep('step-home')">Cancel</button>
    </div>


    <!-- STEP 3: DETAILS & MIC -->
    <div id="step-input" class="step">
        <h2>Provide Details</h2>
        <p id="display-type" style="color: var(--accent-red); font-weight: bold; margin-bottom: 15px;">Target: Unknown</p>
        
        <textarea id="emergency-text" rows="4" placeholder="Briefly describe the situation (e.g. 'Huge grease fire in kitchen, 2 people trapped...')"></textarea>
        
        <button class="mic-btn" id="mic-btn" onclick="toggleMic()">
            🎤 <span>Tap to Speak</span>
        </button>

        <button class="btn btn-blue" onclick="goToStep('step-location')">Continue ➔</button>
        <p id="input-countdown" class="countdown-text"></p>
        <button class="btn btn-outline" onclick="goToStep('step-type')">Back</button>
    </div>


    <!-- STEP 4: LOCATION -->
    <div id="step-location" class="step">
        <h2>Where are you?</h2>
        
        <button class="btn btn-blue" style="margin-bottom: 15px;" onclick="detectGPS()">
            📍 Auto-Detect Live GPS
        </button>
        
        <div id="gps-status" class="status-text"></div>
        <p id="location-countdown" class="countdown-text"></p>
        
        <p style="color: var(--text-muted); margin: 10px 0;">— OR ENTER MANUALLY —</p>
        
        <input type="text" id="manual-location" placeholder="e.g. Times Square, near the red stairs">

        <button class="btn btn-red" style="margin-top:20px; font-size: 1.3rem; letter-spacing: 1px;" onclick="sendToLLM()">
            🚨 ROUTE TO HOSPITAL
        </button>

        <button class="btn btn-outline" onclick="goToStep('step-input')">Back</button>
    </div>


    <!-- STEP 5: AI/BACKEND PROCESSING & RESULT -->
    <div id="step-processing" class="step">
        <div class="radar-spinner"></div>
        <h2>Analyzing via LLM...</h2>
        <p style="color: var(--text-muted);">Predicting vectors and finding the nearest equipped hospital.</p>
        
        <!-- ETA Banner shown after dispatch -->
        <div class="eta-banner" id="eta-banner"></div>

        <!-- Live map shown after dispatch -->
        <div id="dispatch-map"></div>

        <pre id="mock-payload" style="display:none;"></pre>

        <button class="btn btn-outline" id="restart-btn" style="display:none; margin-top:20px;" onclick="location.reload()">Start Over</button>
    </div>

</div>

<script>
    // App State
    const EmergencyState = {
        type: '',
        details: '',
        lat: null,
        lng: null,
        manualAddress: ''
    };

    // Tracks the currently active recognition instance (null = not listening)
    let activeRecognition = null;

    // Timer state
    let stepInputTimer = null;
    let stepLocationTimer = null;
    let dispatchMap = null; // Leaflet map instance

    // Navigation — clears timers and fires step-specific init
    function goToStep(stepId) {
        clearStepTimers();
        document.querySelectorAll('.step').forEach(el => el.classList.remove('active'));
        document.getElementById(stepId).classList.add('active');
        if (stepId === 'step-input') startInputCountdown();
        if (stepId === 'step-location') startLocationCountdown();
    }

    function clearStepTimers() {
        if (stepInputTimer)    { clearInterval(stepInputTimer);    stepInputTimer = null; }
        if (stepLocationTimer) { clearInterval(stepLocationTimer); stepLocationTimer = null; }
    }

    // Auto-continue from Provide Details if no input entered within 10 s
    function startInputCountdown() {
        const countdownEl = document.getElementById('input-countdown');
        let remaining = 10;
        countdownEl.innerText = `Auto-continuing in ${remaining}s if no text entered…`;

        stepInputTimer = setInterval(() => {
            const textarea = document.getElementById('emergency-text');
            if (textarea.value.trim()) {
                // User typed something — cancel
                clearInterval(stepInputTimer);
                stepInputTimer = null;
                countdownEl.innerText = '';
                return;
            }
            remaining--;
            if (remaining <= 0) {
                clearInterval(stepInputTimer);
                stepInputTimer = null;
                countdownEl.innerText = '';
                textarea.value = 'Emergency reported — no specific details provided.';
                goToStep('step-location');
            } else {
                countdownEl.innerText = `Auto-continuing in ${remaining}s if no text entered…`;
            }
        }, 1000);
    }

    // Auto-detect GPS on Location step if nothing provided within 10 s
    function startLocationCountdown() {
        const countdownEl = document.getElementById('location-countdown');
        let remaining = 10;
        countdownEl.innerText = `Auto-detecting GPS in ${remaining}s…`;

        stepLocationTimer = setInterval(() => {
            const manualInput = document.getElementById('manual-location').value.trim();
            if (EmergencyState.lat || manualInput) {
                // Already have location — cancel
                clearInterval(stepLocationTimer);
                stepLocationTimer = null;
                countdownEl.innerText = '';
                return;
            }
            remaining--;
            if (remaining <= 0) {
                clearInterval(stepLocationTimer);
                stepLocationTimer = null;
                countdownEl.innerText = '';
                detectGPS();
            } else {
                countdownEl.innerText = `Auto-detecting GPS in ${remaining}s…`;
            }
        }, 1000);
    }

    // Step 2 Logic
    function selectType(type) {
        EmergencyState.type = type;
        document.getElementById('display-type').innerText = `Category: ${type}`;
        goToStep('step-input');
    }

    // Step 3 Logic (Mic) — Improved: toggle-safe, preserves existing text, interim+final
    function toggleMic() {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRecognition) {
            alert("Speech Recognition API is not supported in this browser. Please use Chrome or Edge.");
            return;
        }

        // If already listening, stop and return
        if (activeRecognition) {
            activeRecognition.stop();
            activeRecognition = null;
            stopMic();
            return;
        }

        const recognition = new SpeechRecognition();
        activeRecognition = recognition;

        recognition.continuous = false;
        recognition.interimResults = true;
        recognition.lang = 'en-US';

        const inputField = document.getElementById('emergency-text');
        const btn = document.getElementById('mic-btn');

        // Snapshot text before listening starts so we can append, not replace
        const textBeforeListening = inputField.value;

        // Visual: set listening state
        btn.classList.add('listening');
        btn.querySelector('span').innerText = 'Listening... (Tap to stop)';

        recognition.onresult = function (event) {
            let interimTranscript = '';
            let finalTranscript = '';

            for (let i = event.resultIndex; i < event.results.length; ++i) {
                if (event.results[i].isFinal) {
                    finalTranscript += event.results[i][0].transcript;
                } else {
                    interimTranscript += event.results[i][0].transcript;
                }
            }

            // Append to existing text; show live typing via interim
            inputField.value = textBeforeListening +
                (textBeforeListening ? ' ' : '') +
                finalTranscript +
                interimTranscript;
        };

        recognition.onerror = function (event) {
            console.error('Speech recognition error:', event.error);
            activeRecognition = null;
            stopMic();
        };

        recognition.onend = function () {
            activeRecognition = null;
            stopMic();
        };

        recognition.start();
    }

    function stopMic() {
        const btn = document.getElementById('mic-btn');
        btn.classList.remove('listening');
        btn.querySelector('span').innerText = 'Tap to Speak';
    }

    // Step 4 Logic (GPS)
    function detectGPS() {
        const status = document.getElementById('gps-status');
        status.style.color = "var(--text-muted)";
        status.innerText = "Locating...";

        if (!navigator.geolocation) {
            status.style.color = "var(--accent-red)";
            status.innerText = "Geolocation is not supported by your browser.";
            return;
        }

        navigator.geolocation.getCurrentPosition(
            (position) => {
                EmergencyState.lat = position.coords.latitude;
                EmergencyState.lng = position.coords.longitude;
                status.style.color = "#34d399";
                status.innerText = `✅ Coordinates locked: ${EmergencyState.lat.toFixed(4)}, ${EmergencyState.lng.toFixed(4)}`;
                document.getElementById('manual-location').disabled = true;
                document.getElementById('manual-location').value = "Auto-detected GPS";
            },
            (error) => {
                status.style.color = "var(--accent-red)";
                status.innerText = "Error: Please allow location or type manually.";
            }
        );
    }

    // Step 5 Logic (Simulate Submission)
    function sendToLLM() {
        EmergencyState.details = document.getElementById('emergency-text').value.trim();
        const manLoc = document.getElementById('manual-location').value.trim();

        if (manLoc !== "Auto-detected GPS") {
            EmergencyState.manualAddress = manLoc;
            // Clear lat/lng if user typed manual override
            EmergencyState.lat = null; 
            EmergencyState.lng = null;
        }

        if (!EmergencyState.details) {
            alert("Please provide at least some details about the emergency.");
            goToStep('step-input');
            return;
        }

        if (!EmergencyState.lat && !EmergencyState.manualAddress) {
            alert("Please provide a location (auto-detect or type manually).");
            return;
        }

        // Show processing screen
        goToStep('step-processing');

        // Call the actual backend API
        const payload = {
            latitude: EmergencyState.lat || 0.0,
            longitude: EmergencyState.lng || 0.0,
            description: `[${EmergencyState.type}] ${EmergencyState.details}. Location Note: ${EmergencyState.manualAddress}`
        };

        fetch('http://localhost:8000/api/v1/triage', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
            },
            body: JSON.stringify(payload)
        })
        .then(response => {
            if (!response.ok) {
                throw new Error(`HTTP error! status: ${response.status}`);
            }
            return response.json();
        })
        .then(data => {
            const h2 = document.querySelector('#step-processing h2');
            const p = document.querySelector('#step-processing p');
            const pre = document.getElementById('mock-payload');
            const radar = document.querySelector('.radar-spinner');
            
            radar.style.display = "none";
            h2.innerText = "Dispatched Successfully";
            h2.style.color = "#34d399";
            p.innerText = "The LLM processed the triage and routed this directly to the best-matched hospital vector.";

            // Parse response safely based on new `dispatched_units` schema
            let distKm = 0;
            let destLat = 0;
            let destLng = 0;
            let destName = "";

            if (data.dispatched_units && data.dispatched_units.medical && data.dispatched_units.medical.hospital_name) {
                distKm = data.dispatched_units.medical.distance_km;
                destLat = data.dispatched_units.medical.latitude;
                destLng = data.dispatched_units.medical.longitude;
                destName = data.dispatched_units.medical.hospital_name;
            } else if (data.dispatched_units && data.dispatched_units.fire && data.dispatched_units.fire.unit_name) {
                distKm = data.dispatched_units.fire.distance_km;
                destLat = data.dispatched_units.fire.latitude;
                destLng = data.dispatched_units.fire.longitude;
                destName = data.dispatched_units.fire.unit_name;
            } else if (data.dispatched_hospital) { // backward compatibility
                distKm = data.dispatched_hospital.distance_km;
                destLat = data.dispatched_hospital.latitude;
                destLng = data.dispatched_hospital.longitude;
                destName = data.dispatched_hospital.hospital_name;
            }

            // ── ETA Calculation (assumes ~60 km/h ambulance speed) ──
            const etaMins = Math.max(1, Math.ceil((distKm / 60) * 60));
            const etaBanner = document.getElementById('eta-banner');
            etaBanner.innerHTML = `🚑 Estimated arrival: <strong>${etaMins} min</strong> &nbsp;(${distKm} km away)`;
            etaBanner.style.display = 'block';

            // ── Leaflet Map ──
            const mapDiv = document.getElementById('dispatch-map');
            mapDiv.style.display = 'block';

            // Destroy previous map instance if it exists
            if (dispatchMap) { dispatchMap.remove(); dispatchMap = null; }

            const userLat  = payload.latitude  || 19.076;   // fallback: Mumbai
            const userLng  = payload.longitude || 72.877;

            dispatchMap = L.map('dispatch-map').setView([userLat, userLng], 13);

            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '© OpenStreetMap contributors'
            }).addTo(dispatchMap);

            // User marker (red)
            const redIcon = L.divIcon({
                className: '',
                html: '<div style="background:#ef4444;width:14px;height:14px;border-radius:50%;border:3px solid #fff;box-shadow:0 0 6px rgba(0,0,0,0.5)"></div>',
                iconSize: [14, 14], iconAnchor: [7, 7]
            });
            L.marker([userLat, userLng], { icon: redIcon })
              .addTo(dispatchMap)
              .bindPopup('📍 Your Location').openPopup();

            if (destLat !== 0 && destLng !== 0) {
                // Unit/Hospital marker (blue)
                const blueIcon = L.divIcon({
                    className: '',
                    html: '<div style="background:#3b82f6;width:16px;height:16px;border-radius:50%;border:3px solid #fff;box-shadow:0 0 6px rgba(0,0,0,0.5)"></div>',
                    iconSize: [16, 16], iconAnchor: [8, 8]
                });
                L.marker([destLat, destLng], { icon: blueIcon })
                  .addTo(dispatchMap)
                  .bindPopup(`🏥 ${destName}`);

                // Route line between user and unit
                L.polyline([[userLat, userLng], [destLat, destLng]], {
                    color: '#ef4444', weight: 3, dashArray: '6 4'
                }).addTo(dispatchMap);

                // Fit map bounds to show both markers
                dispatchMap.fitBounds([[userLat, userLng], [destLat, destLng]], { padding: [30, 30] });
            }

            const outputPayload = {
                sent_to_backend: payload,
                backend_response: data
            };

            pre.innerText = JSON.stringify(outputPayload, null, 2);
            pre.style.display = "block";
            pre.style.color = "#34d399";
            
            document.getElementById('restart-btn').style.display = "inline-block";
        })
        .catch(error => {
            const h2 = document.querySelector('#step-processing h2');
            const p = document.querySelector('#step-processing p');
            const pre = document.getElementById('mock-payload');
            const radar = document.querySelector('.radar-spinner');
            
            radar.style.display = "none";
            h2.innerText = "Error Connecting to Dispatch";
            h2.style.color = "var(--accent-red)";
            p.innerText = "Could not reach the backend server. Make sure it is running on http://localhost:8000.";

            pre.innerText = "Error details:\n" + error;
            pre.style.display = "block";
            pre.style.color = "var(--accent-red)";
            
            document.getElementById('restart-btn').style.display = "inline-block";
        });
    }
</script>

<!-- Leaflet.js -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
